<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蓝坑 3D 洪水淹没演示</title>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.131/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
    <link rel="stylesheet" href="./viewer/cesium-styles.css" />
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.131/Build/Cesium/Cesium.js"></script>
  </head>
  <body>
    <main id="app">
      <section id="cesiumContainer" aria-label="蓝坑三维洪水演示场景"></section>

      <aside class="panel" aria-label="洪水演示控制面板">
        <header class="panel-header">
          <div>
            <h1>蓝坑 3D 洪水淹没演示</h1>
            <p>真实三维场景 · 在线地图 · 动态水位</p>
          </div>
          <span id="load-state" class="state">初始化</span>
        </header>

        <div class="hero-card">
          <div>
            <span>场景模型</span>
            <strong>Cesium ion 3D Tiles</strong>
          </div>
          <div>
            <span>定位方式</span>
            <strong>自动贴地校准</strong>
          </div>
        </div>

        <button id="fly-model" class="primary-action" type="button">回到蓝坑场景</button>

        <section class="control-section flood-controls">
          <div class="section-title">
            <h2>洪水淹没演示</h2>
          </div>
          <label class="check-row">
            <input id="flood-toggle" type="checkbox" />
            显示洪水淹没范围
          </label>
          <label for="flood-scenario">演示情景</label>
          <select id="flood-scenario">
            <option value="minor">低水位漫滩</option>
            <option value="medium" selected>中等洪水</option>
            <option value="major">高水位洪水</option>
            <option value="extreme">极端淹没</option>
          </select>
          <div class="actions three-col">
            <button id="flood-play" type="button">播放上涨</button>
            <button id="flood-reset" type="button">重置</button>
            <button id="fit-flood" type="button">定位洪水</button>
          </div>
          <label for="flood-level">当前水位 <span id="flood-level-value">0.0 m</span></label>
          <input id="flood-level" type="range" min="0" max="56" step="0.1" value="0" />
          <label for="flood-speed">上涨速度 <span id="flood-speed-value">1.0 m/s</span></label>
          <input id="flood-speed" type="range" min="0.2" max="5" step="0.1" value="1" />
          <label for="flood-opacity">水体透明度</label>
          <input id="flood-opacity" type="range" min="0.15" max="0.85" step="0.05" value="0.55" />
          <div id="flood-readout" class="readout">洪水层未开启</div>
        </section>

        <p class="hint">
          打开页面后会自动加载三维模型并贴合地形。勾选洪水范围后，可播放不同水位情景的动态上涨过程。
        </p>
      </aside>
    </main>

    <script type="module" src="./viewer/cesium-app.js"></script>
  </body>
</html>
